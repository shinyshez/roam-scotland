<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSR Far North 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #e8e6dc;
            color: #1a1a1a;
            padding-bottom: 2rem;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(180deg, #000080 0%, #000060 100%);
            padding: 0.75rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .header .subtitle {
            display: none;
        }
        .route-toggle {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            margin-top: 0.6rem;
        }
        .toggle-btn {
            padding: 0.4rem 1rem;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
        .toggle-btn.active {
            background: #fff;
            color: #000080;
            border-color: #fff;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.4);
            text-shadow: none;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        .day-card {
            background: #fff;
            border-radius: 18px;
            margin-bottom: 1rem;
            overflow: hidden;
            border: 2px solid #000080;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 128, 0.15);
        }
        .day-card:active {
            transform: scale(0.98);
        }
        .day-header {
            padding: 1.2rem 1.2rem 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(135deg, rgba(0, 0, 128, 0.05) 0%, rgba(0, 0, 128, 0.02) 100%);
        }
        .day-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            background: #000080;
            color: #fff;
        }
        .day-info {
            flex: 1;
        }
        .day-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #000080;
        }
        .day-route {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            color: #000080;
            background: rgba(0, 0, 128, 0.08);
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .stat-icon {
            font-size: 0.9rem;
        }
        .expand-icon {
            font-size: 1.2rem;
            color: #000080;
            transition: transform 0.3s ease;
            font-weight: bold;
        }
        .day-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        .day-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .day-card.expanded .day-content {
            max-height: 2000px;
        }
        .content-inner {
            padding: 0 1.2rem 1.2rem;
        }
        .section {
            margin-top: 1.2rem;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #000080;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .item {
            background: #f8f8f5;
            border-radius: 10px;
            padding: 0.9rem;
            margin-bottom: 0.6rem;
            border-left: 4px solid #000080;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .item-name {
            font-weight: 700;
            color: #000080;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .item-details {
            font-size: 0.8rem;
            color: #555;
            line-height: 1.6;
        }
        .surface-tag {
            display: inline-block;
            background: #000080;
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 0.6rem;
            font-weight: 600;
        }
        .optional-badge {
            display: inline-block;
            background: #000080;
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0, 0, 128, 0.3);
        }
        .warning {
            background: #fff8e1;
            border-left-color: #ff9800;
            border: 2px solid #ff9800;
        }
        .warning .item-name {
            color: #ff9800;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RSR Far North 2025</h1>
        <div class="route-toggle">
            <button class="toggle-btn active" data-route="rugged">⛰️ Rugged</button>
            <button class="toggle-btn" data-route="rolling">🌾 Rolling</button>
        </div>
    </div>
    <div class="container" id="days-container"></div>
    <script>
        const days = [
            {
                day: 1,
                emoji: '1',
                title: 'Inverness → Bonar Bridge / Golspie',
                rugged: { end: 'Golspie', distance: '121 km', elevation: '1566 m' },
                rolling: { end: 'Bonar Bridge', distance: '89 km', elevation: '1097 m' },
                surface: 'Road → Gravel',
                shops: [
                    { name: 'Evanton Co-op', rugged: '10 km', rolling: '10 km', opens: 'TBC' },
                    { name: 'Ardgay Stores', rugged: '58 km', rolling: '58 km', opens: 'TBC' },
                    { name: 'Spar Bonar Bridge', rugged: 'off-route (+~6 km)', rolling: '89 km', opens: 'TBC' }
                ],
                accommodation: [
                    { name: 'Bonar Bridge / Golspie B&Bs & pods', rugged: '121 km', rolling: '89 km', details: 'TBC' },
                    { name: 'Wild camp options', location: 'Loch Fleet / Strath Carnaig', rugged: '~110–120 km', rolling: '~80–88 km', details: 'Exact spots TBC' }
                ]
            },
            {
                day: 2,
                emoji: '2',
                title: 'Golspie → Helmsdale / Loch More',
                rugged: { end: 'Loch More (via Forsinard)', distance: '94 km', elevation: '1073 m' },
                rolling: { end: 'Helmsdale', distance: '75 km', elevation: '943 m' },
                surface: 'Coastal track • Forest tracks • Moorland',
                shops: [
                    { name: 'Golspie (village)', rugged: '0 km', rolling: '0 km', opens: 'TBC' },
                    { name: 'Brora (coastal detour)', rugged: 'off-route (+~15 km)', rolling: '~12 km', opens: 'TBC' },
                    { name: 'Forsinard Tearoom', rugged: '~52 km', rolling: 'off-route (+~7 km)', opens: 'TBC' },
                    { name: 'Helmsdale shops', rugged: 'off-route (+~10–20 km)', rolling: '75 km', opens: 'TBC' }
                ],
                accommodation: [
                    { name: 'Loch More (beach wild camp)', rugged: '94 km', rolling: '—', details: 'Basic wild camp' },
                    { name: 'Forsinard / Forsinard Lodge', rugged: '~52 km', rolling: 'off-route (+~7 km)', details: 'Booking TBC' },
                    { name: 'Helmsdale hotels/guesthouses', rugged: '—', rolling: '75 km', details: 'TBC' }
                ]
            },
            {
                day: 3,
                emoji: '3',
                title: 'Loch More / Helmsdale → Tongue',
                rugged: { end: 'Tongue', distance: '120 km', elevation: '1120 m' },
                rolling: { end: 'Tongue', distance: '105 km', elevation: '1049 m' },
                surface: 'Moorland • Estate tracks • Coastal',
                shops: [
                    { name: 'Garvault House (lunch)', rugged: '~38 km', rolling: '~30 km', opens: 'TBC' },
                    { name: 'Bettyhill shop & bistro', rugged: '~80 km', rolling: '~75 km', opens: 'TBC' },
                    { name: 'Small croft shops / roadside kiosks', location: 'scattered', opens: 'TBC / seasonal' }
                ],
                accommodation: [
                    { name: 'Tongue hotels & hostel', rugged: '120 km', rolling: '105 km', details: 'Booking TBC' },
                    { name: 'Tongue campsite / bakery', rugged: '~118–120 km', rolling: '~103–105 km', details: 'TBC' }
                ]
            },
            {
                day: 4,
                emoji: '4',
                title: 'Tongue → Lairg / Bonar Bridge',
                rugged: { end: 'Bonar Bridge', distance: '130 km', elevation: '1796 m' },
                rolling: { end: 'Lairg', distance: '90 km', elevation: '1035 m' },
                surface: 'Road + rough tracks • River crossing (Cashel Dhu) on rugged line',
                shops: [
                    { name: 'Crask Inn (roadside)', rugged: '~55 km', rolling: '~40 km', opens: 'TBC, check seasonal hours' },
                    { name: 'Invercassley Tearoom / small shop', rugged: '~95 km', rolling: '~68 km', opens: 'TBC / limited hours' },
                    { name: 'Local pubs (various)', location: 'Lairg / Bonar approaches', opens: 'TBC' }
                ],
                accommodation: [
                    { name: 'Glen Cassley wild camp', rugged: '~110–120 km', rolling: 'off-route', details: 'Spot details TBC' },
                    { name: 'Lairg hotels & B&Bs', rugged: '—', rolling: '90 km', details: 'Booking TBC' },
                    { name: 'Bonar Bridge overnight options', rugged: '130 km', rolling: '—', details: 'TBC' }
                ]
            },
            {
                day: 5,
                emoji: '5',
                title: 'Lairg / Bonar Bridge → Ullapool',
                rugged: { end: 'Ullapool', distance: '92 km', elevation: '957 m' },
                rolling: { end: 'Ullapool', distance: '58 km', elevation: '626 m' },
                surface: 'Long mixed gravel • Rough 5–6 km section (Lochan Diamh)',
                shops: [
                    { name: 'Small roadside shops (limited)', rugged: 'variable', rolling: '0–30 km', opens: 'TBC' },
                    { name: 'Ullapool supermarket & cafés', location: 'Finish', details: 'Large supermarket, opens TBC' }
                ],
                accommodation: [
                    { name: 'Schoolhouse / Knockdamph bothy', rugged: 'on-route', rolling: 'off-route', details: 'No booking, check bothy code' },
                    { name: 'Ullapool hotels / hostels / campsite', location: 'Finish: Ullapool', details: 'Booking/advice TBC' }
                ]
            },
            {
                day: 6,
                emoji: '6',
                title: 'Ullapool → Evanton / Glen Glass',
                rugged: { end: 'Glen Glass / Evanton', distance: '92 km', elevation: '1350 m' },
                rolling: { end: 'Evanton', distance: '90 km', elevation: '1100 m' },
                surface: '~100 km continuous gravel • Long estate tracks',
                shops: [
                    { name: 'Aultguish Inn (off-route)', rugged: '~35–45 km', rolling: 'off-route', opens: 'TBC' },
                    { name: 'Small roadside cafés', location: 'scattered', opens: 'TBC' },
                    { name: 'Evanton / Alness shops & cafés', rugged: '~92 km', rolling: '~90 km', opens: 'TBC' }
                ],
                accommodation: [
                    { name: 'Upper Glen Glass camping spots', rugged: 'near finish (~92 km)', rolling: 'off-route', details: 'Basic wild camping' },
                    { name: 'Evanton / Alness B&Bs & hotels', location: 'Finish', details: 'Booking TBC' }
                ]
            },
            {
                day: 7,
                emoji: '7',
                title: 'Evanton / Glen Glass → Inverness',
                rugged: { end: 'Inverness', distance: '88 km', elevation: '1145 m' },
                rolling: { end: 'Inverness', distance: '39 km', elevation: '364 m' },
                surface: 'Road → Forestry → Firthside',
                shops: [
                    { name: 'Highland Farm Café', rugged: '~25 km', rolling: '~12 km', opens: '10:00? — TBC' },
                    { name: 'Contin shop', rugged: '~30 km', rolling: '~18 km', opens: 'TBC' },
                    { name: 'Conon Hotel / White Cottage Café', location: 'last 10–20 km', opens: 'TBC' }
                ],
                accommodation: [
                    { name: 'Final hotels / B&Bs in Inverness', location: 'Finish: 0 km', details: 'Many options, booking recommended' },
                    { name: 'Last wild camping pockets', location: 'Upper Beauly Firth area', details: 'TBC / check local regs' }
                ]
            }
        ];
        const optional = {
            emoji: '⚠️',
            title: 'Cape Wrath Spoke',
            distance: '~96 km',
            elevation: '~1300 m',
            warning: 'Ferry coordination + MoD range access check required',
            shops: [
                { name: 'Ozone Café at Cape Wrath lighthouse', opens: 'Seasonal — TBC' }
            ],
            accommodation: [
                { name: 'Kearvaig Bothy, local bothies', details: 'Distances variable, details TBC' }
            ],
            access: 'Rugged line variant or separate spoke; detours may be +10–40 km depending on ferry and approach'
        };
        let currentRoute = 'rugged';
        function renderDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            days.forEach((day, index) => {
                const routeData = day[currentRoute];
                const card = document.createElement('div');
                card.className = `day-card day-${day.day}`;
                card.innerHTML = `
                    <div class="day-header" onclick="toggleDay(${index})">
                        <div class="day-icon">${day.emoji}</div>
                        <div class="day-info">
                            <div class="day-title">Day ${day.day}</div>
                            <div class="day-route">${day.title.split('→')[0].trim()} → ${routeData.end}</div>
                            <div class="stats">
                                <div class="stat"><span class="stat-icon">📏</span> ${routeData.distance}</div>
                                <div class="stat"><span class="stat-icon">⛰️</span> ${routeData.elevation}</div>
                            </div>
                        </div>
                        <div class="expand-icon">▼</div>
                    </div>
                    <div class="day-content">
                        <div class="content-inner">
                            <div class="surface-tag">${day.surface}</div>

                            <div class="section">
                                <div class="section-title">🏪 Shops & Cafés</div>
                                ${day.shops.map(shop => {
                                    const distance = currentRoute === 'rugged' ? shop.rugged : shop.rolling;
                                    return `
                                    <div class="item">
                                        <div class="item-name">${shop.name}</div>
                                        <div class="item-details">
                                            ${distance ? `Distance from start of day: ${distance}` : ''}
                                            ${shop.location ? `<br>Location: ${shop.location}` : ''}
                                            ${shop.opens ? `<br>Opening times: ${shop.opens}` : ''}
                                            ${shop.details ? `<br>${shop.details}` : ''}
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>

                            <div class="section">
                                <div class="section-title">🏕️ Camping & Accommodation</div>
                                ${day.accommodation.map(acc => {
                                    const distance = currentRoute === 'rugged' ? acc.rugged : acc.rolling;
                                    return `
                                    <div class="item">
                                        <div class="item-name">${acc.name}</div>
                                        <div class="item-details">
                                            ${distance && distance !== '—' ? `Distance from start of day: ${distance}` : ''}
                                            ${acc.location ? `${distance && distance !== '—' ? '<br>' : ''}Location: ${acc.location}` : ''}
                                            ${acc.details ? `<br>${acc.details}` : ''}
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            // Add optional Cape Wrath spoke
            const optCard = document.createElement('div');
            optCard.className = 'day-card optional';
            optCard.innerHTML = `
                <div class="day-header" onclick="toggleDay(${days.length})">
                    <div class="day-icon">${optional.emoji}</div>
                    <div class="day-info">
                        <div class="day-title">Optional<span class="optional-badge">Epic</span></div>
                        <div class="day-route">${optional.title}</div>
                        <div class="stats">
                            <div class="stat"><span class="stat-icon">📏</span> ${optional.distance}</div>
                            <div class="stat"><span class="stat-icon">⛰️</span> ${optional.elevation}</div>
                        </div>
                    </div>
                    <div class="expand-icon">▼</div>
                </div>
                <div class="day-content">
                    <div class="content-inner">
                        <div class="item warning">
                            <div class="item-name">⚠️ Important</div>
                            <div class="item-details">${optional.warning}<br><br>${optional.access}</div>
                        </div>

                        <div class="section">
                            <div class="section-title">🏪 Shops & Cafés</div>
                            ${optional.shops.map(shop => `
                                <div class="item">
                                    <div class="item-name">${shop.name}</div>
                                    <div class="item-details">Opening times: ${shop.opens}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="section">
                            <div class="section-title">🏕️ Camping & Accommodation</div>
                            ${optional.accommodation.map(acc => `
                                <div class="item">
                                    <div class="item-name">${acc.name}</div>
                                    <div class="item-details">${acc.details}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(optCard);
        }
        function toggleDay(index) {
            const cards = document.querySelectorAll('.day-card');
            cards[index].classList.toggle('expanded');
        }
        // Route toggle
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRoute = btn.dataset.route;
                renderDays();
            });
        });
        renderDays();
    </script>
</body>
</html>
