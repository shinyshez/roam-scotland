<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSR Far North 2025</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #e8e6dc;
            color: #1a1a1a;
            padding-bottom: 2rem;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(180deg, #000080 0%, #000060 100%);
            padding: 0.75rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }
        .header .subtitle {
            display: none;
        }
        .route-toggle {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            margin-top: 0.6rem;
        }
        .toggle-btn {
            padding: 0.4rem 1rem;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
        .toggle-btn.active {
            background: #fff;
            color: #000080;
            border-color: #fff;
            box-shadow: 0 2px 10px rgba(255, 255, 255, 0.4);
            text-shadow: none;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }
        .day-card {
            background: #fff;
            border-radius: 18px;
            margin-bottom: 1rem;
            overflow: hidden;
            border: 2px solid #000080;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 128, 0.15);
        }
        .day-card:active {
            transform: scale(0.98);
        }
        .day-header {
            padding: 1.2rem 1.2rem 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: linear-gradient(135deg, rgba(0, 0, 128, 0.05) 0%, rgba(0, 0, 128, 0.02) 100%);
        }
        .day-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            background: #000080;
            color: #fff;
        }
        .day-info {
            flex: 1;
        }
        .day-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #000080;
        }
        .day-route {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.5rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            color: #000080;
            background: rgba(0, 0, 128, 0.08);
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            font-weight: 600;
        }
        .stat-icon {
            font-size: 0.9rem;
        }
        .expand-icon {
            font-size: 1.2rem;
            color: #000080;
            transition: transform 0.3s ease;
            font-weight: bold;
        }
        .day-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        .day-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .day-card.expanded .day-content {
            max-height: 2000px;
        }
        .content-inner {
            padding: 0 1.2rem 1.2rem;
        }
        .section {
            margin-top: 1.2rem;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #000080;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .item {
            background: #f8f8f5;
            border-radius: 10px;
            padding: 0.9rem;
            margin-bottom: 0.6rem;
            border-left: 4px solid #000080;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .item-name {
            font-weight: 700;
            color: #000080;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .item-details {
            font-size: 0.8rem;
            color: #555;
            line-height: 1.6;
        }
        .surface-tag {
            display: inline-block;
            background: #000080;
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 0.6rem;
            font-weight: 600;
        }
        .optional-badge {
            display: inline-block;
            background: #000080;
            color: #fff;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0, 0, 128, 0.3);
        }
        .warning {
            background: #fff8e1;
            border-left-color: #ff9800;
            border: 2px solid #ff9800;
        }
        .warning .item-name {
            color: #ff9800;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>RSR Far North 2025</h1>
        <div class="route-toggle">
            <button class="toggle-btn active" data-route="rugged">⛰️ Rugged</button>
            <button class="toggle-btn" data-route="rolling">🌾 Rolling</button>
        </div>
    </div>
    <div class="container" id="days-container">
        <div style="text-align:center; padding:3rem 1rem; color:#000080;">
            <div style="font-size:2rem; margin-bottom:1rem;">⏳</div>
            <div style="font-weight:600;">Loading route data...</div>
        </div>
    </div>
    <script>
        // ── CONFIG ──────────────────────────────────────────────
        // Pass sheet ID as ?sheet=YOUR_SHEET_ID in the URL
        const SHEET_ID = new URLSearchParams(window.location.search).get('sheet');

        function sheetURL(tab) {
            return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=csv&sheet=${encodeURIComponent(tab)}`;
        }

        // ── CSV PARSER ──────────────────────────────────────────
        function parseCSV(text) {
            const rows = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const ch = text[i];
                if (inQuotes) {
                    if (ch === '"' && text[i + 1] === '"') { current += '"'; i++; }
                    else if (ch === '"') { inQuotes = false; }
                    else { current += ch; }
                } else {
                    if (ch === '"') { inQuotes = true; }
                    else if (ch === ',') { rows.push(current); current = ''; }
                    else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                        rows.push(current); current = '';
                        if (ch === '\r') i++;
                        rows.push(null); // row delimiter
                    } else { current += ch; }
                }
            }
            if (current) rows.push(current);

            // Split into rows of objects
            const result = [];
            let headers = [];
            let row = [];
            let isHeader = true;
            for (const val of rows) {
                if (val === null) {
                    if (isHeader) { headers = row; isHeader = false; }
                    else if (row.length > 0) {
                        const obj = {};
                        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
                        result.push(obj);
                    }
                    row = [];
                } else { row.push(val); }
            }
            if (row.length > 0 && !isHeader) {
                const obj = {};
                headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
                result.push(obj);
            }
            return result;
        }

        // ── DATA LOADING ────────────────────────────────────────
        let days = [];
        let optional = {};
        let currentRoute = 'rugged';

        async function loadData() {
            if (!SHEET_ID) {
                document.getElementById('days-container').innerHTML = `
                    <div style="text-align:center; padding:3rem 1rem; color:#c00;">
                        <div style="font-size:2rem; margin-bottom:1rem;">⚠️</div>
                        <div style="font-weight:600; margin-bottom:0.5rem;">No Sheet ID provided</div>
                        <div style="font-size:0.85rem; color:#666;">Add <code>?sheet=YOUR_SHEET_ID</code> to the URL.</div>
                    </div>
                `;
                return;
            }
            try {
                const [daysCSV, shopsCSV, accCSV, optCSV] = await Promise.all([
                    fetch(sheetURL('Days')).then(r => r.text()),
                    fetch(sheetURL('Shops')).then(r => r.text()),
                    fetch(sheetURL('Accommodation')).then(r => r.text()),
                    fetch(sheetURL('Optional')).then(r => r.text()),
                ]);

                const daysData = parseCSV(daysCSV);
                const shopsData = parseCSV(shopsCSV);
                const accData = parseCSV(accCSV);
                const optData = parseCSV(optCSV);

                // Group shops and accommodation by day
                const shopsByDay = {};
                shopsData.forEach(s => {
                    const d = s.day;
                    if (!shopsByDay[d]) shopsByDay[d] = [];
                    shopsByDay[d].push(s);
                });

                const accByDay = {};
                accData.forEach(a => {
                    const d = a.day;
                    if (!accByDay[d]) accByDay[d] = [];
                    accByDay[d].push(a);
                });

                // Build days array
                days = daysData.map(d => ({
                    day: parseInt(d.day),
                    emoji: d.day,
                    title: d.title,
                    rugged: { end: d.rugged_end, distance: d.rugged_distance, elevation: d.rugged_elevation },
                    rolling: { end: d.rolling_end, distance: d.rolling_distance, elevation: d.rolling_elevation },
                    surface: d.surface,
                    shops: (shopsByDay[d.day] || []).map(s => ({
                        name: s.name, rugged: s.rugged, rolling: s.rolling,
                        opens: s.opens, location: s.location, details: s.details
                    })),
                    accommodation: (accByDay[d.day] || []).map(a => ({
                        name: a.name, rugged: a.rugged, rolling: a.rolling,
                        details: a.details, location: a.location
                    }))
                }));

                // Build optional object from key-value pairs
                const optMap = {};
                optData.forEach(row => { optMap[row.field] = row.value; });
                optional = {
                    emoji: '⚠️',
                    title: optMap.title || 'Cape Wrath Spoke',
                    distance: optMap.distance || '',
                    elevation: optMap.elevation || '',
                    warning: optMap.warning || '',
                    access: optMap.access || '',
                    shops: [],
                    accommodation: []
                };
                // Collect numbered shop/accommodation entries
                for (let i = 1; optMap[`shop_${i}_name`]; i++) {
                    optional.shops.push({
                        name: optMap[`shop_${i}_name`],
                        opens: optMap[`shop_${i}_opens`] || ''
                    });
                }
                for (let i = 1; optMap[`accommodation_${i}_name`]; i++) {
                    optional.accommodation.push({
                        name: optMap[`accommodation_${i}_name`],
                        details: optMap[`accommodation_${i}_details`] || ''
                    });
                }

                renderDays();
            } catch (err) {
                document.getElementById('days-container').innerHTML = `
                    <div style="text-align:center; padding:3rem 1rem; color:#c00;">
                        <div style="font-size:2rem; margin-bottom:1rem;">⚠️</div>
                        <div style="font-weight:600; margin-bottom:0.5rem;">Failed to load route data</div>
                        <div style="font-size:0.85rem; color:#666;">Check that the Google Sheet is published and the Sheet ID is correct.</div>
                        <div style="font-size:0.75rem; color:#999; margin-top:1rem;">${err.message}</div>
                    </div>
                `;
            }
        }

        // ── RENDERING ───────────────────────────────────────────
        function renderDays() {
            const container = document.getElementById('days-container');
            container.innerHTML = '';
            days.forEach((day, index) => {
                const routeData = day[currentRoute];
                const card = document.createElement('div');
                card.className = `day-card day-${day.day}`;
                card.innerHTML = `
                    <div class="day-header" onclick="toggleDay(${index})">
                        <div class="day-icon">${day.emoji}</div>
                        <div class="day-info">
                            <div class="day-title">Day ${day.day}</div>
                            <div class="day-route">${day.title.split('→')[0].trim()} → ${routeData.end}</div>
                            <div class="stats">
                                <div class="stat"><span class="stat-icon">📏</span> ${routeData.distance}</div>
                                <div class="stat"><span class="stat-icon">⛰️</span> ${routeData.elevation}</div>
                            </div>
                        </div>
                        <div class="expand-icon">▼</div>
                    </div>
                    <div class="day-content">
                        <div class="content-inner">
                            <div class="surface-tag">${day.surface}</div>

                            <div class="section">
                                <div class="section-title">🏪 Shops & Cafés</div>
                                ${day.shops.map(shop => {
                                    const distance = currentRoute === 'rugged' ? shop.rugged : shop.rolling;
                                    return `
                                    <div class="item">
                                        <div class="item-name">${shop.name}</div>
                                        <div class="item-details">
                                            ${distance ? `Distance from start of day: ${distance}` : ''}
                                            ${shop.location ? `<br>Location: ${shop.location}` : ''}
                                            ${shop.opens ? `<br>Opening times: ${shop.opens}` : ''}
                                            ${shop.details ? `<br>${shop.details}` : ''}
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>

                            <div class="section">
                                <div class="section-title">🏕️ Camping & Accommodation</div>
                                ${day.accommodation.map(acc => {
                                    const distance = currentRoute === 'rugged' ? acc.rugged : acc.rolling;
                                    return `
                                    <div class="item">
                                        <div class="item-name">${acc.name}</div>
                                        <div class="item-details">
                                            ${distance && distance !== '—' ? `Distance from start of day: ${distance}` : ''}
                                            ${acc.location ? `${distance && distance !== '—' ? '<br>' : ''}Location: ${acc.location}` : ''}
                                            ${acc.details ? `<br>${acc.details}` : ''}
                                        </div>
                                    </div>
                                `}).join('')}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            // Add optional Cape Wrath spoke
            const optCard = document.createElement('div');
            optCard.className = 'day-card optional';
            optCard.innerHTML = `
                <div class="day-header" onclick="toggleDay(${days.length})">
                    <div class="day-icon">${optional.emoji}</div>
                    <div class="day-info">
                        <div class="day-title">Optional<span class="optional-badge">Epic</span></div>
                        <div class="day-route">${optional.title}</div>
                        <div class="stats">
                            <div class="stat"><span class="stat-icon">📏</span> ${optional.distance}</div>
                            <div class="stat"><span class="stat-icon">⛰️</span> ${optional.elevation}</div>
                        </div>
                    </div>
                    <div class="expand-icon">▼</div>
                </div>
                <div class="day-content">
                    <div class="content-inner">
                        <div class="item warning">
                            <div class="item-name">⚠️ Important</div>
                            <div class="item-details">${optional.warning}<br><br>${optional.access}</div>
                        </div>

                        <div class="section">
                            <div class="section-title">🏪 Shops & Cafés</div>
                            ${optional.shops.map(shop => `
                                <div class="item">
                                    <div class="item-name">${shop.name}</div>
                                    <div class="item-details">Opening times: ${shop.opens}</div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="section">
                            <div class="section-title">🏕️ Camping & Accommodation</div>
                            ${optional.accommodation.map(acc => `
                                <div class="item">
                                    <div class="item-name">${acc.name}</div>
                                    <div class="item-details">${acc.details}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(optCard);
        }
        function toggleDay(index) {
            const cards = document.querySelectorAll('.day-card');
            cards[index].classList.toggle('expanded');
        }
        // Route toggle
        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRoute = btn.dataset.route;
                renderDays();
            });
        });
        // Load data on page load
        loadData();
    </script>
</body>
</html>
